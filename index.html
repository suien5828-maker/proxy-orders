<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC 選物代購 - 訂單登記系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #print-section { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <header class="bg-slate-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <span class="text-xs font-bold tracking-widest uppercase text-slate-400 block mb-1">代購管理</span>
                <h1 class="text-3xl font-extrabold tracking-tight">CC 選物代購</h1>
                <p class="text-xs text-slate-400 mt-1">訂單登記系統 —— 上傳商品圖片 → 填寫資料 → 即時同步給團隊</p>
            </div>
            <nav class="flex bg-slate-800 p-1 rounded-xl border border-slate-700">
                <button onclick="switchTab('list')" id="btn-tab-list" class="px-5 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 cursor-pointer bg-indigo-600 text-white shadow">📋 訂單列表</button>
                <button onclick="switchTab('arrange')" id="btn-tab-arrange" class="px-5 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 cursor-pointer text-slate-300 hover:text-white">📦 訂單整理</button>
                <button onclick="switchTab('shipping')" id="btn-tab-shipping" class="px-5 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 cursor-pointer text-slate-300 hover:text-white">🚚 出貨單</button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <section id="tab-list" class="space-y-8">
            <div class="bg-white rounded-2xl shadow-xs border border-slate-200/80 p-6">
                <h2 class="text-xl font-bold text-slate-900 mb-6 flex items-center gap-2">✨ 新增訂單</h2>
                <form id="order-form" onsubmit="handleOrderSubmit(event)" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-1 flex flex-col justify-center items-center border-2 border-dashed border-slate-300 rounded-xl p-4 bg-slate-50 relative group min-h-[220px]">
                        <input type="file" id="file-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="previewImage(event)">
                        <div id="upload-placeholder" class="text-center space-y-2 pointer-events-none">
                            <div class="text-3xl">📷</div>
                            <p class="text-sm font-medium text-slate-600">點擊或拖曳圖片上傳</p>
                        </div>
                        <img id="image-preview" class="hidden max-h-[200px] object-contain rounded-lg shadow-xs">
                    </div>

                    <div class="md:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">社群暱稱 *</label>
                            <input type="text" id="nickname" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500" placeholder="客人暱稱">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">手機號碼 *</label>
                            <input type="text" id="phone" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500" placeholder="查詢與通知用">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">商品名稱 *</label>
                            <input type="text" id="item" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500" placeholder="如：上衣、外套、零食">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">尺寸/規格</label>
                            <input type="text" id="size" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500" placeholder="如：M、粉100">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">數量 *</label>
                            <input type="number" id="quantity" value="1" min="1" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">廠商</label>
                            <input type="text" id="vendor" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500" placeholder="廠商名稱">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">客人選填幣別 *</label>
                            <select id="currency_type" onchange="toggleCurrencyLogic()" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500">
                                <option value="JPY">日幣 (JPY)</option>
                                <option value="TWD">台幣 (TWD)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">原價金額 *</label>
                            <input type="number" id="price_original" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500" placeholder="請輸入日幣金額">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">基本運費</label>
                            <input type="number" id="shipping_fee" value="0" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">其他加價</label>
                            <input type="number" id="extra_fee" value="0" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500">
                        </div>
                        <div class="sm:col-span-2 pt-2">
                            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-xl text-sm tracking-wide shadow-md transition-all cursor-pointer">+ 加入訂單</button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="bg-white rounded-2xl shadow-xs border border-slate-200/80 overflow-hidden">
                <div class="p-5 border-b border-slate-100 bg-slate-50/50">
                    <h3 class="font-bold text-slate-900 text-lg">📋 原始登記列表</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="bg-slate-100 text-slate-700 font-semibold border-b border-slate-200">
                                <th class="p-4">圖片</th>
                                <th class="p-4">買家</th>
                                <th class="p-4">商品明細</th>
                                <th class="p-4">原填價格</th>
                                <th class="p-4">防呆處理 (匯率/台幣修改)</th>
                                <th class="p-4">商品狀態</th>
                                <th class="p-4 text-center">最終計算額</th>
                                <th class="p-4 text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="orders-tbody" class="divide-y divide-slate-100 text-slate-600"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="tab-arrange" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold text-slate-900">📦 訂單整理 (依廠商分類)</h2>
                <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold py-2 px-4 rounded-xl shadow-md cursor-pointer no-print">🖨️ 列印此頁面</button>
            </div>
            <div id="arrange-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

        <section id="tab-shipping" class="hidden space-y-6">
            <div class="flex justify-between items-center no-print">
                <h2 class="text-2xl font-bold text-slate-900">🚚 出貨單 (依客人分類)</h2>
                <button onclick="printSelectedShipping()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold py-2 px-4 rounded-xl shadow-md cursor-pointer">🖨️ 批量列印勾選出貨單</button>
            </div>
            <div id="shipping-container" class="grid grid-cols-1 gap-6"></div>
        </section>

    </main>

    <div id="print-section" class="hidden p-8 bg-white"></div>

    <script>
        const SUPABASE_URL = "https://zwabpiysvlqvqunauwyj.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3YWJwaXlzdmxxdnF1bmF1d3lqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTA1MzgsImV4cCI6MjA5NzY4NjUzOH0.-jx1ikazqqKRta-8lEoifeKR9bVVm_E00m4e17q_6z8";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allOrders = [];

        document.addEventListener("DOMContentLoaded", () => {
            fetchOrders();
        });

        function switchTab(tabName) {
            ['list', 'arrange', 'shipping'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`btn-tab-${t}`).className = "px-5 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 text-slate-300 hover:text-white cursor-pointer";
            });
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            document.getElementById(`btn-tab-${tabName}`).className = "px-5 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 bg-indigo-600 text-white shadow cursor-pointer";
            
            if(tabName === 'arrange') renderArrangeTab();
            if(tabName === 'shipping') renderShippingTab();
        }

        function toggleCurrencyLogic() {
            const type = document.getElementById('currency_type').value;
            document.getElementById('price_original').placeholder = type === 'JPY' ? "請輸入日幣金額" : "請輸入台幣金額";
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('image-preview').src = e.target.result;
                    document.getElementById('image-preview').classList.remove('hidden');
                    document.getElementById('upload-placeholder').classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        async function fetchOrders() {
            const { data, error } = await _supabase.from('orders').select('*').order('created_at', { ascending: false });
            if (!error) {
                allOrders = data || [];
                renderOrdersTable();
            } else {
                console.error("讀取失敗:", error);
            }
        }

        async function handleOrderSubmit(event) {
            event.preventDefault();
            const nickname = document.getElementById('nickname').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const item = document.getElementById('item').value.trim();
            const size = document.getElementById('size').value.trim();
            const quantity = parseInt(document.getElementById('quantity').value) || 1;
            const vendor = document.getElementById('vendor').value.trim() || '未分類';
            const currency_type = document.getElementById('currency_type').value;
            const price_original = parseFloat(document.getElementById('price_original').value) || 0;
            const shipping_fee = parseFloat(document.getElementById('shipping_fee').value) || 0;
            const extra_fee = parseFloat(document.getElementById('extra_fee').value) || 0;

            let exchange_rate = currency_type === 'JPY' ? 0.22 : 1;
            let price_twd = currency_type === 'JPY' ? Math.round(price_original * exchange_rate) : price_original;
            let total_amount = (price_twd * quantity) + shipping_fee + extra_fee;

            let image_url = "";
            const file = document.getElementById('file-input').files[0];
            if (file) {
                const fileName = `${Date.now()}-${file.name}`;
                const { error: uploadError } = await _supabase.storage.from('product-images').upload(fileName, file);
                if (!uploadError) {
                    image_url = _supabase.storage.from('product-images').getPublicUrl(fileName).data.publicUrl;
                } else {
                    console.error("圖片上傳失敗:", uploadError);
                }
            }

            const { error } = await _supabase.from('orders').insert([{
                nickname, phone, item, size, quantity, vendor, currency_type,
                price_original, exchange_rate, price_twd, shipping_fee, extra_fee,
                total_amount, status: '處理中', image_url
            }]);

            if (!error) {
                document.getElementById('order-form').reset();
                document.getElementById('image-preview').classList.add('hidden');
                document.getElementById('upload-placeholder').classList.remove('hidden');
                fetchOrders();
            } else {
                alert("寫入失敗: " + error.message);
            }
        }

        // 修改匯率、台幣單價、狀態的防呆更新邏輯
        async function updateOrderField(id, field, value) {
            let updateData = {};
            const order = allOrders.find(o => o.id === id);
            if (!order) return;

            if (field === 'exchange_rate') {
                const rate = parseFloat(value) || 0;
                const twdPrice = Math.round(order.price_original * rate);
                const total = (twdPrice * order.quantity) + order.shipping_fee + order.extra_fee;
                updateData = { exchange_rate: rate, price_twd: twdPrice, total_amount: total };
            } 
            else if (field === 'price_twd') {
                const twdPrice = parseFloat(value) || 0;
                const total = (twdPrice * order.quantity) + order.shipping_fee + order.extra_fee;
                updateData = { price_twd: twdPrice, total_amount: total };
            } 
            else if (field === 'status') {
                updateData = { status: value };
            }

            const { error } = await _supabase.from('orders').update(updateData).eq('id', id);
            if (!error) fetchOrders();
        }

        async function deleteOrder(id) {
            if (confirm("確定要刪除這筆登記嗎？")) {
                await _supabase.from('orders').delete().eq('id', id);
                fetchOrders();
            }
        }

        function renderOrdersTable() {
            const tbody = document.getElementById('orders-tbody');
            tbody.innerHTML = '';
            allOrders.forEach(o => {
                const isJPY = o.currency_type === 'JPY';
                
                // 工作人員管理核心切換邏輯
                let operatorHtml = '';
                if (isJPY) {
                    operatorHtml = `
                        <div class="space-y-1 text-xs">
                            <div class="flex items-center gap-1">
                                <span class="text-slate-400">改匯率:</span>
                                <input type="number" step="0.001" value="${o.exchange_rate || 0.22}" onchange="updateOrderField(${o.id}, 'exchange_rate', this.value)" class="w-16 px-1 py-0.5 border rounded border-slate-300">
                            </div>
                            <div class="text-slate-500">換算: NT$ ${o.price_twd}</div>
                        </div>
                    `;
                } else {
                    operatorHtml = `
                        <div class="flex items-center gap-1 text-xs">
                            <span class="text-slate-400">改台幣:</span>
                            <input type="number" value="${o.price_twd}" onchange="updateOrderField(${o.id}, 'price_twd', this.value)" class="w-20 px-1 py-0.5 border rounded border-slate-300">
                        </div>
                    `;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-4">${o.image_url ? `<img src="${o.image_url}" class="w-12 h-12 object-cover rounded shadow-xs border border-slate-100">` : '<div class="w-12 h-12 bg-slate-100 rounded flex items-center justify-center text-xs text-slate-400">無圖</div>'}</td>
                    <td class="p-4 font-bold">${o.nickname}<br><span class="text-xs text-slate-400 font-mono">${o.phone}</span></td>
                    <td class="p-4">${o.item} (${o.size || '通規'})<br><span class="text-xs text-slate-500">數量: ${o.quantity} / 廠商: ${o.vendor}</span></td>
                    <td class="p-4 font-semibold text-slate-700">${isJPY ? '円' : 'NT$'} ${o.price_original}</td>
                    <td class="p-4">${operatorHtml}</td>
                    <td class="p-4">
                        <select onchange="updateOrderField(${o.id}, 'status', this.value)" class="text-xs font-semibold px-2 py-1 border border-slate-300 rounded bg-white cursor-pointer">
                            <option value="處理中" ${o.status === '處理中' ? 'selected' : ''}>⏳ 處理中</option>
                            <option value="採購成功" ${o.status === '採購成功' ? 'selected' : ''}>✅ 採購成功</option>
                            <option value="斷貨" ${o.status === '斷貨' ? 'selected' : ''}>❌ 斷貨</option>
                            <option value="出貨準備中" ${o.status === '出貨準備中' ? 'selected' : ''}>📦 出貨準備中</option>
                            <option value="已完成" ${o.status === '已完成' ? 'selected' : ''}>🎉 已完成</option>
                        </select>
                    </td>
                    <td class="p-4 font-bold text-center text-slate-900">
                        ${o.status === '斷貨' ? '<span class="text-rose-500 line-through text-xs">斷貨免計</span>' : `NT$ ${o.total_amount}`}
                    </td>
                    <td class="p-4 text-center"><button onclick="deleteOrder(${o.id})" class="text-rose-500 font-bold p-2 cursor-pointer">✕</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderArrangeTab() {
            const container = document.getElementById('arrange-container');
            container.innerHTML = '';
            const groups = {};
            allOrders.forEach(o => {
                if(!groups[o.vendor]) groups[o.vendor] = [];
                groups[o.vendor].push(o);
            });
            for (const v in groups) {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-2xl border border-slate-200 shadow-xs";
                div.innerHTML = `<h3 class="font-extrabold text-lg text-indigo-900 border-b-2 border-indigo-100 pb-2 mb-3">🏭 廠商：${v}</h3>`;
                groups[v].forEach(o => {
                    div.innerHTML += `
                        <div class="flex items-center gap-3 py-2 border-b border-slate-50 last:border-0 text-sm">
                            ${o.image_url ? `<img src="${o.image_url}" class="w-10 h-10 object-cover rounded">` : `<div class="w-10 h-10 bg-slate-100 text-xs flex items-center justify-center rounded">無圖</div>`}
                            <div class="flex-1">
                                <span class="font-bold">${o.item}</span> - ${o.nickname} (${o.quantity}件) 
                                <span class="text-xs px-1.5 py-0.5 rounded ml-2 ${o.status === '斷貨' ? 'bg-rose-50 text-rose-600' : 'bg-slate-100 text-slate-600'}">${o.status}</span>
                            </div>
                        </div>
                    `;
                });
                container.appendChild(div);
            }
        }

        function renderShippingTab() {
            const container = document.getElementById('shipping-container');
            container.innerHTML = '';
            const groups = {};
            allOrders.forEach(o => {
                if(!groups[o.phone]) groups[o.phone] = { name: o.nickname, list: [] };
                groups[o.phone].list.push(o);
            });
            for (const p in groups) {
                let total = 0;
                let itemsHtml = '';
                
                groups[p].list.forEach(o => { 
                    if(o.status !== '斷貨') {
                        total += o.total_amount; 
                    }
                    itemsHtml += `
                        <div class="flex justify-between items-center py-2 border-b border-slate-100 last:border-0 text-sm">
                            <div class="flex items-center gap-3">
                                ${o.image_url ? `<img src="${o.image_url}" class="w-12 h-12 object-cover rounded">` : `<div class="w-12 h-12 bg-slate-100 text-xs flex items-center justify-center rounded">無圖</div>`}
                                <div>
                                    <p class="font-semibold text-slate-800">${o.item} <span class="text-xs text-slate-400">(${o.size || '通規'}) x ${o.quantity}</span></p>
                                    <p class="text-xs text-slate-500">狀態: ${o.status}</p>
                                </div>
                            </div>
                            <div class="font-medium text-slate-900">
                                ${o.status === '斷貨' ? '<span class="text-rose-500 line-through">斷貨不計</span>' : `NT$ ${o.total_amount}`}
                            </div>
                        </div>
                    `;
                });

                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-2xl border border-slate-200 shadow-xs shipping-card relative";
                div.dataset.phone = p;
                div.innerHTML = `
                    <div class="absolute top-6 left-6 no-print">
                        <input type="checkbox" class="shipping-checkbox w-5 h-5 rounded text-indigo-600 border-slate-300 cursor-pointer">
                    </div>
                    <div class="pl-8">
                        <h3 class="font-bold text-lg text-slate-800">👤 客人：${groups[p].name} <span class="text-sm text-slate-400 font-mono">(${p})</span></h3>
                        <div class="py-3 my-2 divide-y divide-slate-100">${itemsHtml}</div>
                        <div class="text-right font-black text-xl text-rose-600 border-t pt-3">應付總額 (已扣斷貨): NT$ ${total}</div>
                    </div>
                `;
                container.appendChild(div);
            }
        }

        function printSelectedShipping() {
            const printSection = document.getElementById('print-section');
            printSection.innerHTML = '<h1 class="text-2xl font-black text-center mb-6 pb-2 border-b-2 border-slate-900">CC 選物代購 - 批量出貨單明細</h1>';
            let hasSelected = false;
            document.querySelectorAll('.shipping-card').forEach(card => {
                const chk = card.querySelector('.shipping-checkbox');
                if (chk && chk.checked) {
                    hasSelected = true;
                    const clone = card.cloneNode(true);
                    if(clone.querySelector('.no-print')) clone.querySelector('.no-print').remove();
                    const wrapper = document.createElement('div');
                    wrapper.className = "mb-8 pb-8 border-b-2 border-dashed border-slate-300 page-break";
                    wrapper.appendChild(clone);
                    printSection.appendChild(wrapper);
                }
            });
            if (!hasSelected) { alert("請先勾選您想要列印的客人家出貨單！"); return; }
            window.print();
        }
    </script>
</body>
</html>
