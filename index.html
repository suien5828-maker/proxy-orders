<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CC 選物代購 - 訂單管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F5F3EF; font-family: 'PingFang TC','Noto Sans TC',sans-serif; min-height: 100vh; }
.header { background: #1A1A2E; padding: 18px 20px; border-bottom: 3px solid #E8A87C; }
.header-eyebrow { font-size: 10px; letter-spacing: 4px; color: #E8A87C; margin-bottom: 4px; }
.header h1 { color: #fff; font-size: 20px; font-weight: 700; }
.header p { color: #A0A0B8; font-size: 11px; margin-top: 2px; }
.trip-badge { display:inline-block; background:#E8A87C; color:#1A1A2E; border-radius:6px; padding:3px 12px; font-size:12px; font-weight:700; margin-top:6px; }
.tabs { background: #1A1A2E; border-bottom: 1px solid #2E2E45; overflow-x:auto; }
.tabs-inner { display: flex; min-width:max-content; }
.tab-btn { background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; padding: 11px 14px; font-size: 12px; font-weight: 600; color: #A0A0B8; font-family: inherit; white-space:nowrap; }
.tab-btn.active { color: #E8A87C; border-bottom-color: #E8A87C; }
.main { max-width: 900px; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.card { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #E8E4DF; }
.card-title { font-weight: 700; color: #1A1A2E; font-size: 14px; margin-bottom: 14px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-group { display: flex; flex-direction: column; }
.form-group.full { grid-column: 1 / -1; }
label, .field-lbl { font-size: 11px; font-weight: 600; color: #6B6B80; letter-spacing: 0.5px; margin-bottom: 4px; }
input[type=text], input[type=number], select, textarea { width: 100%; border: 1.5px solid #DDD8D0; border-radius: 8px; padding: 9px 11px; font-size: 13px; color: #1A1A2E; background: #FAFAF8; outline: none; font-family: inherit; }
input:focus, select:focus { border-color: #E8A87C; }
input[readonly] { background: #F5F3EF; color: #6B6B80; }
.btn-primary { background: #1A1A2E; color: #E8A87C; border: none; border-radius: 8px; padding: 11px 24px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-secondary { background: #1A1A2E; color: #E8A87C; border: none; border-radius: 7px; padding: 7px 16px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-danger { background: transparent; border: 1px solid #E0BCBC; border-radius: 6px; color: #D64045; font-size: 11px; padding: 3px 10px; cursor: pointer; font-family: inherit; }
.badge { background: #E8A87C; color: #1A1A2E; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 700; margin-left: 8px; }
.upload-zone { width: 80px; height: 80px; border: 2px dashed #C8C4BE; border-radius: 10px; cursor: pointer; background: #FAFAF8; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
.upload-zone:hover { border-color: #E8A87C; }
.thumb { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; border: 1px solid #E0DCD8; flex-shrink: 0; }
.no-img { width: 100px; height: 100px; background: #F0EDEA; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #CCC; flex-shrink: 0; }
.status-badge { display:inline-block; border-radius:6px; padding:3px 10px; font-size:11px; font-weight:600; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { padding: 8px 10px; text-align: left; color: #6B6B80; font-weight: 600; font-size: 11px; border-bottom: 2px solid #E8E4DF; background: #F5F3EF; white-space:nowrap; }
td { padding: 7px 10px; border-bottom: 1px solid #F0EDEA; vertical-align: middle; }
.empty { text-align: center; color: #B0AAA4; font-size: 13px; padding: 40px 0; }
.loading { text-align: center; color: #A0A0B8; font-size: 12px; padding: 28px 0; }
.alert-box { background:#FFF3E0; border:1px solid #FFB74D; border-radius:10px; padding:14px 16px; }
.alert-title { font-weight:700; color:#E65100; font-size:13px; margin-bottom:10px; }
.inline-input { border: 1.5px solid #DDD8D0; border-radius: 6px; padding: 5px 8px; font-size: 12px; color: #1A1A2E; background: #FAFAF8; outline: none; font-family: inherit; width: 100%; }
.inline-input:focus { border-color: #E8A87C; }
.inline-calc { border: 1.5px solid #E8A87C; border-radius: 6px; padding: 5px 8px; font-size: 12px; color: #6B6B80; background: #FEF9F4; width: 100%; }
.price-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:6px; margin-top:8px; }
.saving-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:#E8A87C; margin-left:6px; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.order-card { background:#fff; border-radius:12px; overflow:hidden; border:1px solid #E8E4DF; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
.order-card-header { background:#1A1A2E; padding:12px 16px; }
.order-item-row { padding:14px 16px; border-bottom:1px solid #F0EDEA; display:flex; gap:12px; }
.order-item-row:last-of-type { border-bottom:none; }
.order-footer { background:#F9F7F5; border-top:2px solid #E8E4DF; padding:14px 16px; }
.footer-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
.total-row { display:flex; justify-content:space-between; align-items:center; border-top:1px solid #E8E4DF; padding-top:12px; }
@media print {
  body { background:white; }
  .header,.tabs,.no-print { display:none !important; }
  .main { padding:0; max-width:100%; }
  .order-card { box-shadow:none; border:1px solid #ccc; break-inside:avoid; margin-bottom:12px; }
  .order-card-header { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
}
</style>
</head>
<body>
<div class="header">
  <div class="header-eyebrow">代購管理</div>
  <h1>CC 選物代購</h1>
  <p>訂單登記系統</p>
  <div class="trip-badge" id="header-trip">📍 載入中…</div>
</div>
<div class="tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" onclick="switchTab('orders')">📋 訂單列表</button>
    <button class="tab-btn" onclick="switchTab('picking')">📋 訂單整理</button>
    <button class="tab-btn" onclick="switchTab('shipping')">🚚 出貨單</button>
    <button class="tab-btn" onclick="switchTab('customer')">👤 客人查詢</button>
  </div>
</div>

<div class="main">

  <!-- 訂單列表 -->
  <div id="orders-tab">
    <!-- 新增訂單 -->
    <div class="card no-print">
      <div class="card-title">新增訂單</div>
      <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:14px">
        <div>
          <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
            <span style="font-size:22px">📷</span>
          </div>
          <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(this)">
          <button class="btn-danger" id="remove-img-btn" style="display:none;margin-top:4px;width:80px" onclick="removeImage()">✕ 移除</button>
        </div>
        <div style="flex:1">
          <div class="form-grid">
            <div class="form-group"><label>暱稱 *</label><input type="text" id="f-nickname" placeholder="客人暱稱"></div>
            <div class="form-group"><label>商品 *</label><input type="text" id="f-item" placeholder="如：上衣、零食"></div>
            <div class="form-group"><label>日幣 ¥</label><input type="number" id="f-jpy" placeholder="如：1500" oninput="calcTwd()"></div>
            <div class="form-group"><label>數量</label><input type="number" id="f-qty" placeholder="1" min="1"></div>
            <div class="form-group"><label>尺寸/規格</label><input type="text" id="f-size" placeholder="如：粉100、藍S"></div>
            <div class="form-group"><label>匯率 ¥1=NT$?</label><input type="number" id="f-rate" step="0.01" value="0.3" placeholder="0.3" oninput="calcTwd()"></div>
            <div class="form-group"><label>換算台幣（自動）</label><input type="text" id="f-calc" readonly placeholder="自動計算"></div>
            <div class="form-group"><label>直接台幣售價</label><input type="number" id="f-twd" placeholder="填了優先使用"></div>
            <div class="form-group full"><label>廠商</label><input type="text" id="f-vendor" placeholder="廠商名稱"></div>
            <div class="form-group full">
              <label>商品狀態</label>
              <select id="f-status">
                <option value="pending">處理中</option>
                <option value="success">採購成功</option>
                <option value="outofstock">斷貨</option>
                <option value="preparing">出貨準備中</option>
                <option value="done">已完成</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <div id="form-error" style="color:#D64045;font-size:12px;margin-bottom:8px;display:none"></div>
      <div id="form-success" style="color:#2E7D32;font-size:12px;margin-bottom:8px;display:none"></div>
      <button class="btn-primary" id="add-btn" onclick="addOrder()">+ 加入訂單</button>
    </div>

    <!-- 團次管理 -->
    <div class="card no-print">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:13px;font-weight:600;color:#1A1A2E">目前團次：</span>
          <span id="current-trip-label" style="background:#E8A87C;color:#1A1A2E;border-radius:6px;padding:3px 12px;font-size:13px;font-weight:700">載入中…</span>
        </div>
        <div style="display:flex;gap:6px">
          <button onclick="toggleArchived()" id="archive-btn" style="background:transparent;border:1.5px solid #DDD8D0;border-radius:6px;padding:6px 12px;font-size:11px;color:#6B6B80;cursor:pointer;font-family:inherit">📦 查看歷史</button>
          <button onclick="closeTrip()" style="background:#D64045;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">🔒 結團</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div style="font-size:11px;font-weight:600;color:#6B6B80;margin-bottom:6px">切換團次</div>
          <div style="display:flex;gap:6px">
            <select id="trip-select" style="flex:1;border:1.5px solid #DDD8D0;border-radius:6px;padding:7px;font-size:12px;color:#1A1A2E;background:#FAFAF8;outline:none;font-family:inherit"></select>
            <button onclick="switchTrip()" style="background:#1A1A2E;color:#E8A87C;border:none;border-radius:6px;padding:7px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">切換</button>
          </div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;color:#6B6B80;margin-bottom:6px">新增團次</div>
          <div style="display:flex;gap:6px">
            <input type="text" id="new-trip-input" placeholder="輸入新團次名稱" style="flex:1;border:1.5px solid #DDD8D0;border-radius:6px;padding:7px;font-size:12px;color:#1A1A2E;background:#FAFAF8;outline:none;font-family:inherit">
            <button onclick="addTrip()" style="background:#1A1A2E;color:#E8A87C;border:none;border-radius:6px;padding:7px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap">＋ 新增</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 訂單列表 -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div><span style="font-weight:700;color:#1A1A2E;font-size:14px">所有訂單</span><span class="badge" id="order-count">0</span></div>
        <button class="btn-secondary no-print" onclick="loadOrders()">🔄 重整</button>
      </div>
      <div class="loading" id="loading-orders">載入中…</div>
      <div class="table-wrap" id="table-wrap" style="display:none">
        <table>
          <thead><tr><th>圖片</th><th>日期</th><th>暱稱</th><th>商品</th><th>尺寸</th><th>數量</th><th>廠商</th><th>日幣</th><th>台幣</th><th>狀態</th><th></th></tr></thead>
          <tbody id="order-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 訂單整理 -->
  <div id="picking-tab" style="display:none">
    <!-- 待處理提醒 -->
    <div class="alert-box no-print" id="alert-box" style="display:none">
      <div class="alert-title">⚠️ 待處理項目（未填價格或狀態為處理中）</div>
      <select id="alert-select" onchange="showAlertDetail()" style="width:100%;border:1.5px solid #FFB74D;border-radius:8px;padding:8px;font-size:13px;color:#E65100;background:#fff;outline:none;font-family:inherit;margin-bottom:8px">
        <option value="">-- 選擇客人查看詳細 --</option>
      </select>
      <div id="alert-detail" style="display:none;flex-direction:column;gap:6px"></div>
    </div>

    <!-- 選客人 -->
    <div class="card no-print">
      <label style="margin-bottom:6px">選擇客人</label>
      <select id="picking-select" onchange="onPickingSelect()" style="width:100%;border:1.5px solid #DDD8D0;border-radius:8px;padding:9px;font-size:14px;color:#1A1A2E;background:#FAFAF8;outline:none;font-family:inherit">
        <option value="">-- 選擇客人 --</option>
      </select>
    </div>

    <div class="loading" id="loading-picking" style="display:none">載入中…</div>
    <div id="picking-content"></div>
  </div>

  <!-- 出貨單 -->
  <div id="shipping-tab" style="display:none">
    <div class="no-print" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-weight:700;color:#1A1A2E;font-size:14px">出貨單</span>
      <button class="btn-secondary" onclick="printPage()">🖨 列印</button>
    </div>

    <!-- 待處理提醒 -->
    <div class="alert-box no-print" id="ship-alert-box" style="display:none;margin-bottom:14px">
      <div class="alert-title">⚠️ 待處理項目（未填價格或狀態為處理中）</div>
      <select id="ship-alert-select" onchange="showShipAlertDetail()" style="width:100%;border:1.5px solid #FFB74D;border-radius:8px;padding:8px;font-size:13px;color:#E65100;background:#fff;outline:none;font-family:inherit;margin-bottom:8px">
        <option value="">-- 選擇客人查看詳細 --</option>
      </select>
      <div id="ship-alert-detail" style="display:none;flex-direction:column;gap:6px"></div>
    </div>

    <!-- 選客人 -->
    <div class="card no-print" style="margin-bottom:14px">
      <label style="margin-bottom:6px">選擇客人</label>
      <select id="shipping-select" onchange="onShippingSelect()" style="width:100%;border:1.5px solid #DDD8D0;border-radius:8px;padding:9px;font-size:14px;color:#1A1A2E;background:#FAFAF8;outline:none;font-family:inherit">
        <option value="">-- 選擇客人 --</option>
      </select>
    </div>

    <!-- 團次總金額 -->
    <div class="card no-print" style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:#6B6B80;margin-bottom:8px">查詢團次總售出金額</div>
      <div style="display:flex;gap:8px">
        <select id="revenue-select" style="flex:1;border:1.5px solid #DDD8D0;border-radius:8px;padding:8px;font-size:13px;color:#1A1A2E;background:#FAFAF8;outline:none;font-family:inherit">
          <option value="">-- 選擇團次 --</option>
        </select>
        <button onclick="showRevenue()" class="btn-secondary">查詢</button>
      </div>
      <div id="revenue-result" style="display:none;margin-top:12px;background:#FEF9F4;border-radius:8px;padding:14px;border:1px solid #E8A87C">
        <div style="font-size:12px;color:#6B6B80;margin-bottom:6px" id="revenue-label"></div>
        <div style="font-size:22px;font-weight:700;color:#E8A87C;margin-bottom:12px" id="revenue-amount"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          <div style="background:#fff;border-radius:8px;padding:10px;text-align:center;border:1px solid #E8E4DF">
            <div style="font-size:10px;color:#6B6B80;margin-bottom:4px">登記總數</div>
            <div style="font-size:18px;font-weight:700;color:#1A1A2E" id="stat-total">-</div>
          </div>
          <div style="background:#E8F5E9;border-radius:8px;padding:10px;text-align:center;border:1px solid #C8E6C9">
            <div style="font-size:10px;color:#2E7D32;margin-bottom:4px">採購成功</div>
            <div style="font-size:18px;font-weight:700;color:#2E7D32" id="stat-success">-</div>
          </div>
          <div style="background:#F0F0F8;border-radius:8px;padding:10px;text-align:center;border:1px solid #D0D0E8">
            <div style="font-size:10px;color:#A0A0B8;margin-bottom:4px">待處理</div>
            <div style="font-size:18px;font-weight:700;color:#A0A0B8" id="stat-pending">-</div>
          </div>
        </div>
      </div>
    </div>

    <div class="loading" id="loading-shipping" style="display:none">載入中…</div>
    <div id="shipping-content"></div>
  </div>

  <!-- 客人查詢 -->
  <div id="customer-tab" style="display:none">
    <div class="card no-print">
      <label style="margin-bottom:6px">選擇客人</label>
      <select id="customer-select" onchange="onCustomerSelect()" style="width:100%;border:1.5px solid #DDD8D0;border-radius:8px;padding:9px;font-size:14px;color:#1A1A2E;background:#FAFAF8;outline:none;font-family:inherit">
        <option value="">-- 選擇客人 --</option>
      </select>
    </div>
    <div class="loading" id="loading-customer" style="display:none">載入中…</div>
    <div id="customer-content" style="margin-top:14px"></div>
  </div>

</div>

<script>
const SURL = 'https://zwabpiysvlqvqunauwyj.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3YWJwaXlzdmxxdnF1bmF1d3lqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTA1MzgsImV4cCI6MjA5NzY4NjUzOH0.-jx1ikazqqKRta-8lEoifeKR9bVVm_E00m4e17q_6z8';
const sb = window.supabase.createClient(SURL, SKEY);

const STATUS = {
  pending:    { label:'處理中',     color:'#A0A0B8', bg:'#F0F0F8' },
  success:    { label:'採購成功',   color:'#2E7D32', bg:'#E8F5E9' },
  outofstock: { label:'斷貨',       color:'#D64045', bg:'#FFEBEE' },
  preparing:  { label:'出貨準備中', color:'#E65100', bg:'#FFF3E0' },
  done:       { label:'已完成',     color:'#1565C0', bg:'#E3F2FD' },
};
const COUNT_STATUSES = ['success','preparing','done'];

let allOrders = [];
let currentTrip = 'CC六月連線/選物訂單';
let knownTrips = ['CC六月連線/選物訂單'];
let showArchived = false;
let currentImageFile = null;
const saveTimers = {};

// ── Helpers ────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(d) { return d ? String(d).slice(0,10) : '-'; }
function statusBadge(status) {
  const s = STATUS[status] || STATUS.pending;
  return `<span class="status-badge" style="background:${s.bg};color:${s.color}">${s.label}</span>`;
}
function calcTwdVal(o) {
  if (o.price_twd && Number(o.price_twd) > 0) return Number(o.price_twd);
  if (o.price_jpy && o.rate) return o.price_jpy * o.rate;
  return 0;
}
function itemTotal(o) {
  if (!COUNT_STATUSES.includes(o.status || 'pending')) return 0;
  return calcTwdVal(o) * (parseInt(o.quantity) || 1);
}
function groupByNickname(orders) {
  const map = {}, display = {};
  orders.forEach(o => {
    const k = o.nickname.toLowerCase();
    if (!map[k]) { map[k] = []; display[k] = o.nickname; }
    map[k].push(o);
  });
  const result = {};
  Object.keys(map).forEach(k => result[display[k]] = map[k]);
  return result;
}
function needsAttention(o) {
  const hasTwd = Number(o.price_twd) > 0;
  const hasJpy = Number(o.price_jpy) > 0;
  const missingPrice = !hasTwd && !hasJpy && o.status !== 'outofstock';
  const isPending = (o.status || 'pending') === 'pending';
  return missingPrice || isPending;
}

// ── Image ──────────────────────────────────────────
function compressImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height, max = 1200;
        if (w > max || h > max) {
          if (w > h) { h = Math.round(h*max/w); w = max; }
          else { w = Math.round(w*max/h); h = max; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        let q = 0.85;
        const tryIt = () => canvas.toBlob(blob => {
          if (blob.size > 800*1024 && q > 0.4) { q -= 0.1; tryIt(); }
          else resolve(new File([blob], file.name, { type: 'image/jpeg' }));
        }, 'image/jpeg', q);
        tryIt();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
async function handleFile(input) {
  if (!input.files[0]) return;
  const file = await compressImage(input.files[0]);
  currentImageFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('upload-zone').innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`;
    document.getElementById('remove-img-btn').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

// ── Form ───────────────────────────────────────────
function calcTwd() {
  const jpy = parseFloat(document.getElementById('f-jpy').value) || 0;
  const rate = parseFloat(document.getElementById('f-rate').value) || 0;
  const el = document.getElementById('f-calc');
  el.value = (jpy && rate) ? 'NT$' + Math.round(jpy * rate).toLocaleString() : '';
}
async function addOrder() {
  const nickname = document.getElementById('f-nickname').value.trim();
  const item = document.getElementById('f-item').value.trim();
  if (!nickname || !item) {
    const e = document.getElementById('form-error');
    e.textContent = '請至少填寫暱稱和商品'; e.style.display = 'block'; return;
  }
  document.getElementById('form-error').style.display = 'none';
  const btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = '儲存中…';

  let image_url = null;
  if (currentImageFile) {
    const fname = Date.now() + '.jpg';
    const { error: ue } = await sb.storage.from('product-image').upload(fname, currentImageFile);
    if (!ue) {
      const { data: ud } = sb.storage.from('product-image').getPublicUrl(fname);
      image_url = ud.publicUrl;
    }
  }
  const row = {
    nickname,
    item,
    size: document.getElementById('f-size').value.trim(),
    quantity: parseInt(document.getElementById('f-qty').value) || 1,
    vendor: document.getElementById('f-vendor').value.trim(),
    price_jpy: parseFloat(document.getElementById('f-jpy').value) || 0,
    rate: parseFloat(document.getElementById('f-rate').value) || 0,
    price_twd: parseFloat(document.getElementById('f-twd').value) || 0,
    status: document.getElementById('f-status').value,
    trip: currentTrip,
    image_url,
  };
  const { error } = await sb.from('orders').insert([row]);
  btn.disabled = false; btn.textContent = '+ 加入訂單';
  if (error) {
    const e = document.getElementById('form-error');
    e.textContent = '儲存失敗：' + error.message; e.style.display = 'block'; return;
  }
  const s = document.getElementById('form-success');
  s.textContent = '✓ 訂單已儲存！'; s.style.display = 'block';
  setTimeout(() => s.style.display = 'none', 3000);
  ['f-nickname','f-item','f-size','f-qty','f-vendor','f-jpy','f-twd','f-calc'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('f-rate').value = '0.3';
  document.getElementById('f-status').value = 'pending';
  removeImage();
  await loadOrders();
}

// ── Auto-save single field ─────────────────────────
function autoSave(orderId, field, value) {
  const key = `${orderId}_${field}`;
  clearTimeout(saveTimers[key]);
  saveTimers[key] = setTimeout(async () => {
    const data = {};
    if (['price_jpy','rate','price_twd'].includes(field)) data[field] = parseFloat(value) || 0;
    else if (field === 'quantity') data[field] = parseInt(value) || 1;
    else data[field] = value;
    await sb.from('orders').update(data).eq('id', orderId);
    // Refresh totals without full reload
    await loadOrders(true);
  }, 800);
}

// ── Load ───────────────────────────────────────────
async function loadOrders(silent = false) {
  if (!silent) {
    document.getElementById('loading-orders').style.display = 'block';
    document.getElementById('table-wrap').style.display = 'none';
  }
  const { data } = await sb.from('orders').select('*').order('created_at', { ascending: false });
  allOrders = data || [];

  // Update known trips
  const dbTrips = [...new Set(allOrders.map(o => o.trip).filter(Boolean))];
  dbTrips.forEach(t => { if (!knownTrips.includes(t)) knownTrips.push(t); });

  const filtered = showArchived ? allOrders : allOrders.filter(o => (o.trip || currentTrip) === currentTrip);

  renderTable(filtered);
  renderTripUI();
  populateSelects(filtered);
  renderAlerts(filtered);

  // Re-render active picking/shipping/customer if visible
  const activeTab = document.querySelector('.tab-btn.active');
  if (activeTab) {
    const tab = activeTab.getAttribute('onclick').match(/'(\w+)'/)?.[1];
    if (tab === 'picking') onPickingSelect(true);
    if (tab === 'shipping') onShippingSelect(true);
    if (tab === 'customer') onCustomerSelect(true);
  }
}

// ── Trip UI ────────────────────────────────────────

function switchTrip() {

}
function addTrip() {
  const v = document.getElementById('new-trip-input').value.trim();

function closeTrip() {

}

// ── Populate Selects ──────────────────────────────
function populateSelects(orders) {
  const groups = groupByNickname(orders);
  const names = Object.keys(groups).sort((a,b) => a.localeCompare(b,'zh-TW'));

  ['picking-select','shipping-select','customer-select'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const cur = sel.value;
    let opts = '<option value="">-- 選擇客人 --</option>';
    if (id === 'picking-select') {
      opts += `<option value="__ALL__" ${cur==='__ALL__'?'selected':''}>📋 全部商品（按時間）</option>`;
      opts += `<option value="__PENDING__" ${cur==='__PENDING__'?'selected':''}>⏳ 待處理商品</option>`;
    }
    opts += names.map(n => `<option value="${esc(n)}" ${n===cur?'selected':''}>${esc(n)}</option>`).join('');
    sel.innerHTML = opts;
  });
}

// ── Alerts ─────────────────────────────────────────
function renderAlerts(orders) {
  const bad = orders.filter(needsAttention);
  const groups = groupByNickname(bad);
  const names = Object.keys(groups).sort((a,b) => a.localeCompare(b,'zh-TW'));

  ['alert-box','ship-alert-box'].forEach(boxId => {
    const box = document.getElementById(boxId);
    const sel = document.getElementById(boxId === 'alert-box' ? 'alert-select' : 'ship-alert-select');
    if (!box || !sel) return;
    if (names.length > 0) {
      box.style.display = 'block';
      sel.innerHTML = `<option value="">-- 選擇客人查看詳細 (${names.length} 位) --</option>` +
        names.map(n => `<option value="${esc(n)}">${esc(n)}（${groups[n].length} 件）</option>`).join('');
      sel._groups = groups;
    } else {
      box.style.display = 'none';
    }
  });
}

      <div><div class="field-lbl">備註</div><input class="inline-input" type="text" value="${esc(note)}" oninput="autoSaveGroup('${esc(name)}','note',this.value,${items.map(o=>o.id).join(',')})"></div>
    </div>
    <div class="total-row">
      <span style="font-size:12px;color:#6B6B80">商品合計＋運費＋加價－折扣</span>
      <span style="font-weight:700;font-size:17px;color:#E8A87C" id="total-${esc(name)}">${total>0?'NT$'+Math.round(total).toLocaleString():'待確認'}</span>
    </div>
  </div></div>`;

  document.getElementById('picking-content').innerHTML = html;
}

function calcInlineTwd(id, grid) {
  if (!grid) return;
  const inputs = grid.querySelectorAll('input[type=number]');
  const jpy = parseFloat(inputs[0]?.value)||0;
  const rate = parseFloat(inputs[1]?.value)||0;
  const calc = document.getElementById('calc-'+id);
  if (calc) calc.value = (jpy&&rate) ? 'NT$'+Math.round(jpy*rate).toLocaleString() : '';
}

function autoSaveGroup(nickname, field, value, ...ids) {
  const key = `group_${nickname}_${field}`;
  clearTimeout(saveTimers[key]);
  saveTimers[key] = setTimeout(async () => {
    const data = {};
    if (['shipping','extra','discount'].includes(field)) data[field] = parseFloat(value)||0;
    else data[field] = value;
    for (const id of ids) {
      await sb.from('orders').update(data).eq('id', id);
    }
    await loadOrders(true);
  }, 800);
}

// ── Shipping ───────────────────────────────────────
function onShippingSelect(silent = false) {
  const val = document.getElementById('shipping-select').value;
  const orders = showArchived ? allOrders : allOrders.filter(o => (o.trip||currentTrip)===currentTrip);
  if (!val) { document.getElementById('shipping-content').innerHTML = ''; return; }
  renderShippingCustomer(val, orders);
}

function renderShippingCustomer(name, orders) {
  const items = orders.filter(o => o.nickname.toLowerCase() === name.toLowerCase())
    .sort((a,b) => new Date(a.created_at)-new Date(b.created_at));
  if (!items.length) { document.getElementById('shipping-content').innerHTML = '<div class="empty">找不到此客人訂單</div>'; return; }

  const itemsTwd = items.reduce((s,o) => s + itemTotal(o), 0);
  const shipping = Number(items[0]?.shipping||0);
  const extra = Number(items[0]?.extra||0);
  const discount = Number(items[0]?.discount||0);
  const note = items[0]?.note||'';
  const total = itemsTwd + shipping + extra - discount;

  let html = `<div class="order-card">
    <div class="order-card-header" style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="color:#fff;font-weight:700;font-size:16px">${esc(name)}</div>
        <div style="color:#A0A0B8;font-size:11px;margin-top:2px">${fmt(items[0]?.created_at)}　共 ${items.reduce((s,o)=>s+(parseInt(o.quantity)||1),0)} 件</div>
      </div>
      <div style="color:#E8A87C;font-weight:700;font-size:16px">${total>0?'NT$'+Math.round(total).toLocaleString():'待確認'}</div>
    </div>`;

  items.forEach((o,i) => {
    const s = STATUS[o.status]||STATUS.pending;
    const twd = calcTwdVal(o);
    const twdTotal = itemTotal(o);
    html += `<div style="display:flex;gap:14px;align-items:center;padding:14px 16px;border-bottom:1px solid #F0EDEA;background:${i%2?'#FAFAF8':'#fff'}">
      ${o.image_url?`<img src="${esc(o.image_url)}" class="thumb">`:
        '<div class="no-img">無圖</div>'}
      <div style="flex:1">
        <div style="font-weight:700;color:${o.status==='outofstock'?'#D64045':'#1A1A2E'};font-size:14px;margin-bottom:4px">${esc(o.item)}${o.status==='outofstock'?' （斷貨）':''}</div>
        <div style="font-size:12px;color:#6B6B80">
          ${o.size?esc(o.size)+'　':''}數量：${o.quantity||1}${o.vendor?`　廠商：${esc(o.vendor)}`:''}
        </div>
        <div style="font-size:12px;color:#6B6B80;margin-top:2px">
          ${o.price_jpy>0?`日幣：¥${Number(o.price_jpy).toLocaleString()}　`:''}
          ${twd>0&&o.status!=='outofstock'?`台幣：<b style="color:#1A1A2E">NT$${Math.round(twd).toLocaleString()}</b>`:''}
        </div>
        <div style="margin-top:4px">
          <span class="status-badge" style="background:${s.bg};color:${s.color};font-size:11px">${s.label}</span>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        ${o.status==='outofstock'?'<div style="color:#D64045;font-size:12px;font-weight:600">不計費</div>':
          twdTotal>0?`<div style="font-weight:700;color:#1A1A2E;font-size:14px">NT$${Math.round(twdTotal).toLocaleString()}</div>`:''}
      </div>
    </div>`;
  });

  html += `<div class="order-footer">
    ${itemsTwd>0?`<div style="display:flex;justify-content:space-between;font-size:13px;color:#6B6B80;margin-bottom:4px"><span>商品合計</span><span>NT$${Math.round(itemsTwd).toLocaleString()}</span></div>`:''}
    ${shipping>0?`<div style="display:flex;justify-content:space-between;font-size:13px;color:#6B6B80;margin-bottom:4px"><span>運費</span><span>NT$${shipping.toLocaleString()}</span></div>`:''}
    ${extra>0?`<div style="display:flex;justify-content:space-between;font-size:13px;color:#6B6B80;margin-bottom:4px"><span>其他加價</span><span>NT$${extra.toLocaleString()}</span></div>`:''}
    ${discount>0?`<div style="display:flex;justify-content:space-between;font-size:13px;color:#2E7D32;margin-bottom:4px"><span>優惠折扣</span><span>-NT$${discount.toLocaleString()}</span></div>`:''}
    ${note?`<div style="display:flex;justify-content:space-between;font-size:13px;color:#6B6B80;margin-bottom:4px"><span>備註</span><span>${esc(note)}</span></div>`:''}
    <div style="display:flex;justify-content:space-between;font-weight:700;font-size:17px;color:#1A1A2E;border-top:1px solid #E8E4DF;padding-top:10px;margin-top:6px">
      <span>應付總金額</span>
      <span style="color:#E8A87C">${total>0?'NT$'+Math.round(total).toLocaleString():'待確認'}</span>
    </div>
  </div></div>`;

  document.getElementById('shipping-content').innerHTML = html;
}

function showRevenue() {
  const trip = document.getElementById('revenue-select').value;
  if (!trip) { alert('請選擇團次'); return; }
  const pwd = prompt('請輸入密碼：');
  if (pwd !== '888') { alert('密碼錯誤！'); return; }
  const tripOrders = allOrders.filter(o => (o.trip||currentTrip) === trip);
  const total = tripOrders.reduce((s,o) => s + itemTotal(o), 0);
  const groups = groupByNickname(tripOrders);
  const adj = Object.values(groups).reduce((s, items) => {
    return s + Number(items[0]?.shipping||0) + Number(items[0]?.extra||0) - Number(items[0]?.discount||0);
  }, 0);
  const grand = total + adj;
  const totalQty = tripOrders.reduce((s,o)=>s+(parseInt(o.quantity)||1),0);
  const successQty = tripOrders.filter(o=>COUNT_STATUSES.includes(o.status||'pending')).reduce((s,o)=>s+(parseInt(o.quantity)||1),0);
  const pendingQty = tripOrders.filter(o=>(o.status||'pending')==='pending').reduce((s,o)=>s+(parseInt(o.quantity)||1),0);
  document.getElementById('revenue-result').style.display = 'block';
  document.getElementById('revenue-label').textContent = `${trip}（採購成功/出貨準備中/已完成）`;
  document.getElementById('revenue-amount').textContent = `NT$${Math.round(grand).toLocaleString()}`;
  document.getElementById('stat-total').textContent = totalQty+' 件';
  document.getElementById('stat-success').textContent = successQty+' 件';
  document.getElementById('stat-pending').textContent = pendingQty+' 件';
}

function printPage() { window.print(); }

// ── Customer ───────────────────────────────────────
function onCustomerSelect(silent = false) {
  const val = document.getElementById('customer-select').value;
  if (!val) { document.getElementById('customer-content').innerHTML = ''; return; }
  renderCustomer(val);
}

function renderCustomer(name) {
  const items = allOrders.filter(o => o.nickname.toLowerCase() === name.toLowerCase());
  if (!items.length) { document.getElementById('customer-content').innerHTML = '<div class="empty">找不到此客人訂單</div>'; return; }

  // Group by trip
  const tripMap = {};
  items.forEach(o => {
    const t = o.trip || currentTrip;
    if (!tripMap[t]) tripMap[t] = [];
    tripMap[t].push(o);
  });

  const grandTotal = Object.values(tripMap).reduce((s, tItems) => {
    const twd = tItems.reduce((ts,o)=>ts+itemTotal(o),0);
    const sh = Number(tItems[0]?.shipping||0);
    const ex = Number(tItems[0]?.extra||0);
    const dis = Number(tItems[0]?.discount||0);
    return s + twd + sh + ex - dis;
  }, 0);

  let html = `<div style="background:#1A1A2E;border-radius:12px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div>
      <div style="color:#fff;font-weight:700;font-size:16px">${esc(name)}</div>
      <div style="color:#A0A0B8;font-size:12px;margin-top:2px">共 ${Object.keys(tripMap).length} 個團次・${items.reduce((s,o)=>s+(parseInt(o.quantity)||1),0)} 件</div>
    </div>
    <div style="color:#E8A87C;font-weight:700;font-size:16px">${grandTotal>0?'NT$'+Math.round(grandTotal).toLocaleString():'待確認'}</div>
  </div>`;

  Object.entries(tripMap).forEach(([trip, tItems]) => {
    const sorted = [...tItems].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    const itemsTwd = sorted.reduce((s,o)=>s+itemTotal(o),0);
    const shipping = Number(sorted[0]?.shipping||0);
    const extra = Number(sorted[0]?.extra||0);
    const discount = Number(sorted[0]?.discount||0);
    const note = sorted[0]?.note||'';
    const total = itemsTwd + shipping + extra - discount;

    html += `<div style="background:#2A2A4E;border-radius:10px 10px 0 0;padding:10px 16px;margin-top:6px;display:flex;justify-content:space-between">
      <span style="color:#E8A87C;font-weight:700;font-size:13px">🏷 ${esc(trip)}</span>
      <span style="color:#A0A0B8;font-size:12px">${sorted.reduce((s,o)=>s+(parseInt(o.quantity)||1),0)} 件</span>
    </div>
    <div class="order-card" style="border-radius:0 0 12px 12px;border-top:none">`;

    sorted.forEach((o,i) => {
      const s = STATUS[o.status]||STATUS.pending;
      const twd = calcTwdVal(o);
      const twdTotal = itemTotal(o);
      html += `<div style="display:flex;gap:12px;align-items:center;padding:12px 16px;border-bottom:1px solid #F0EDEA;background:${i%2?'#FAFAF8':'#fff'}">
        ${o.image_url?`<img src="${esc(o.image_url)}" class="thumb">`:
          '<div class="no-img">無圖</div>'}
        <div style="flex:1">
          <div style="font-weight:700;color:${o.status==='outofstock'?'#D64045':'#1A1A2E'};font-size:14px;margin-bottom:3px">${esc(o.item)}${o.status==='outofstock'?' （斷貨）':''}</div>
          <div style="font-size:12px;color:#6B6B80">尺寸/規格：${esc(o.size)||'-'}　數量：${o.quantity||1}</div>
          ${o.price_jpy>0?`<div style="font-size:12px;color:#6B6B80;margin-top:2px">日幣原價：¥${Number(o.price_jpy).toLocaleString()}</div>`:''}
          <div style="margin-top:4px"><span class="status-badge" style="background:${s.bg};color:${s.color};font-size:11px">${s.label}</span></div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          ${o.status==='outofstock'?'<div style="color:#D64045;font-size:12px">不計費</div>':
            twdTotal>0?`<div style="font-weight:700;color:#1A1A2E;font-size:14px">NT$${Math.round(twdTotal).toLocaleString()}</div>`:''}
        </div>
      </div>`;
    });

    html += `<div style="background:#FEF9F4;padding:12px 16px;border-radius:0 0 12px 12px">
      ${itemsTwd>0?`<div style="display:flex;justify-content:space-between;font-size:12px;color:#6B6B80;margin-bottom:3px"><span>商品合計</span><span>NT$${Math.round(itemsTwd).toLocaleString()}</span></div>`:''}
      ${shipping>0?`<div style="display:flex;justify-content:space-between;font-size:12px;color:#6B6B80;margin-bottom:3px"><span>運費</span><span>NT$${shipping.toLocaleString()}</span></div>`:''}
      ${extra>0?`<div style="display:flex;justify-content:space-between;font-size:12px;color:#6B6B80;margin-bottom:3px"><span>其他加價</span><span>NT$${extra.toLocaleString()}</span></div>`:''}
      ${discount>0?`<div style="display:flex;justify-content:space-between;font-size:12px;color:#2E7D32;margin-bottom:3px"><span>優惠折扣</span><span>-NT$${discount.toLocaleString()}</span></div>`:''}
      ${note?`<div style="display:flex;justify-content:space-between;font-size:12px;color:#6B6B80;margin-bottom:3px"><span>備註</span><span>${esc(note)}</span></div>`:''}
      <div style="display:flex;justify-content:space-between;font-weight:700;font-size:16px;color:#1A1A2E;border-top:1px solid #E8A87C;padding-top:8px;margin-top:6px">
        <span>本團應付</span>
        <span style="color:#E8A87C">${total>0?'NT$'+Math.round(total).toLocaleString():'待確認'}</span>
      </div>
    </div></div>`;
  });

  document.getElementById('customer-content').innerHTML = html;
}

// ── Tab ─────────────────────────────────────────────
function switchTab(tab) {
  ['orders','picking','shipping','customer'].forEach(t => {
    document.getElementById(t+'-tab').style.display = t===tab?'block':'none';
  });
  document.querySelectorAll('.tab-btn').forEach((btn,i) => {
    btn.classList.toggle('active', ['orders','picking','shipping','customer'][i]===tab);
  });
  const orders = showArchived ? allOrders : allOrders.filter(o=>(o.trip||currentTrip)===currentTrip);
  if (tab==='picking') { populateSelects(orders); onPickingSelect(); }
  if (tab==='shipping') { populateSelects(orders); onShippingSelect(); }
  if (tab==='customer') { populateSelects(orders); onCustomerSelect(); }
}

// ── Init ────────────────────────────────────────────
loadOrders();
// Realtime
sb.channel('orders-rt').on('postgres_changes',{event:'*',schema:'public',table:'orders'},()=>loadOrders(true)).subscribe();
